name: Build Android APK

on:
  push:
    branches: [main, lovegame-in-documents]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4G'"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: adopt-hotspot
        java-version: 17

    - name: Build Debug APK
      run: |
        cd app
        bash ./gradlew assembleNormalRecordDebug --no-daemon

    - name: Build Release APK (unsigned)
      run: |
        cd app
        bash ./gradlew assembleNormalRecordRelease --no-daemon

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: love-android-debug
        path: app/app/build/outputs/apk/normalRecord/debug/app-normal-record-debug.apk
        retention-days: 7

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: love-android-release-unsigned
        path: app/app/build/outputs/apk/normalRecord/release/app-normal-record-release-unsigned.apk
        retention-days: 7
